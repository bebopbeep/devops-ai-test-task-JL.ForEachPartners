# @req SCI-CI-001
# @req SCI-CI-002
# @req SCI-TRACE-001
name: infra-ci

on:
  push:
  pull_request:

jobs:
  # @req SCI-CI-001
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Lint umbrella chart
        run: helm lint charts/sdd-navigator --with-subcharts --strict

  # @req SCI-CI-001
  # @req SCI-CI-002
  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform

      - name: Render manifests
        run: helm template sdd-navigator charts/sdd-navigator > /tmp/rendered-manifests.yaml

      - name: Validate manifests against Kubernetes schemas
        run: kubeconform --strict --summary /tmp/rendered-manifests.yaml

      - name: Enforce infrastructure policies
        run: python3 scripts/check-infra-policy.py /tmp/rendered-manifests.yaml

  # @req SCI-CI-001
  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: python -m pip install --upgrade pip ansible-core==2.17.11 ansible-lint==24.9.2

      - name: Lint Ansible content
        run: ansible-lint ansible/

  # @req SCI-CI-001
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: python -m pip install --upgrade pip yamllint==1.35.1

      - name: Lint YAML files
        run: yamllint -d relaxed .

  # @req SCI-TRACE-001
  traceability:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run traceability check
        run: bash scripts/check-traceability.sh

  # @req SCI-CI-001
  # @req SCI-CI-002
  summary:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - helm-lint
      - helm-validate
      - ansible-lint
      - yamllint
      - traceability
    steps:
      - name: Write workflow summary
        run: |
          {
            echo "## Infrastructure CI Summary"
            echo
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| helm-lint | ${{ needs.helm-lint.result }} |"
            echo "| helm-validate | ${{ needs.helm-validate.result }} |"
            echo "| ansible-lint | ${{ needs.ansible-lint.result }} |"
            echo "| yamllint | ${{ needs.yamllint.result }} |"
            echo "| traceability | ${{ needs.traceability.result }} |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Fail when any required job failed
        run: |
          test "${{ needs.helm-lint.result }}" = "success"
          test "${{ needs.helm-validate.result }}" = "success"
          test "${{ needs.ansible-lint.result }}" = "success"
          test "${{ needs.yamllint.result }}" = "success"
          test "${{ needs.traceability.result }}" = "success"
