# @req SCI-HELM-003
# @req SCI-HELM-006
# @req SCI-SEC-001
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sdd-navigator.componentFullname" (dict "root" . "component" "frontend") }}
  namespace: {{ include "sdd-navigator.namespace" . }}
  labels:
    {{- include "sdd-navigator.labels" (dict "root" . "component" "frontend") | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sdd-navigator.selectorLabels" (dict "root" . "component" "frontend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sdd-navigator.selectorLabels" (dict "root" . "component" "frontend") | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: frontend
          image: {{ include "sdd-navigator.image" (dict "root" . "image" .Values.image) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              cat > /tmp/nginx.conf <<'EOF'
              worker_processes  1;
              pid /tmp/nginx.pid;
              events { worker_connections  1024; }
              http {
                access_log /dev/stdout;
                error_log /dev/stderr warn;
                client_body_temp_path /tmp/client_temp;
                proxy_temp_path /tmp/proxy_temp;
                fastcgi_temp_path /tmp/fastcgi_temp;
                uwsgi_temp_path /tmp/uwsgi_temp;
                scgi_temp_path /tmp/scgi_temp;
                server {
                  listen {{ .Values.containerPort }};
                  server_name _;
                  root /usr/share/nginx/html;
                  index index.html;
                  location / {
                    try_files $uri $uri/ /index.html;
                  }
                }
              }
              EOF
              nginx -g 'daemon off;' -c /tmp/nginx.conf
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
