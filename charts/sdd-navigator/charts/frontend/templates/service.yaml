# @req SCI-HELM-003
# @req SCI-HELM-006
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sdd-navigator.componentFullname" (dict "root" . "component" "frontend") }}
  namespace: {{ include "sdd-navigator.namespace" . }}
  labels:
    {{- include "sdd-navigator.labels" (dict "root" . "component" "frontend") | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "sdd-navigator.selectorLabels" (dict "root" . "component" "frontend") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
