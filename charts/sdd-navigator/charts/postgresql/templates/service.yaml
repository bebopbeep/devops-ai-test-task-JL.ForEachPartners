# @req SCI-HELM-002
# @req SCI-HELM-006
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sdd-navigator.componentFullname" (dict "root" . "component" "postgresql") }}
  namespace: {{ include "sdd-navigator.namespace" . }}
  labels:
    {{- include "sdd-navigator.labels" (dict "root" . "component" "postgresql") | nindent 4 }}
spec:
  selector:
    {{- include "sdd-navigator.selectorLabels" (dict "root" . "component" "postgresql") | nindent 4 }}
  ports:
    - name: postgresql
      port: {{ .Values.service.port }}
      targetPort: postgresql
