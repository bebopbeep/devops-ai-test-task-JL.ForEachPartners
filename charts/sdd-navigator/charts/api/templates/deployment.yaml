# @req SCI-HELM-001
# @req SCI-HELM-005
# @req SCI-HELM-006
# @req SCI-SEC-001
{{- $dbHost := default (include "sdd-navigator.componentFullname" (dict "root" . "component" "postgresql")) .Values.config.databaseHost -}}
{{- $dbSecret := default (printf "%s-db" .Release.Name) .Values.database.existingSecret -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sdd-navigator.componentFullname" (dict "root" . "component" "api") }}
  namespace: {{ include "sdd-navigator.namespace" . }}
  labels:
    {{- include "sdd-navigator.labels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sdd-navigator.selectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sdd-navigator.selectorLabels" (dict "root" . "component" "api") | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: {{ include "sdd-navigator.image" (dict "root" . "image" .Values.image) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
          env:
            - name: API_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sdd-navigator.componentFullname" (dict "root" . "component" "api") }}
                  key: API_PORT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sdd-navigator.componentFullname" (dict "root" . "component" "api") }}
                  key: LOG_LEVEL
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sdd-navigator.componentFullname" (dict "root" . "component" "api") }}
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sdd-navigator.componentFullname" (dict "root" . "component" "api") }}
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sdd-navigator.componentFullname" (dict "root" . "component" "api") }}
                  key: DATABASE_NAME
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecret }}
                  key: {{ .Values.database.usernameKey }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecret }}
                  key: {{ .Values.database.passwordKey }}
            - name: DATABASE_URL
              value: postgresql://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.securityContext.readOnlyRootFilesystem }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- end }}
      {{- if .Values.securityContext.readOnlyRootFilesystem }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- end }}
