# @req SCI-HELM-005
# @req SCI-HELM-006
{{- $dbHost := default (include "sdd-navigator.componentFullname" (dict "root" . "component" "postgresql")) .Values.config.databaseHost -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sdd-navigator.componentFullname" (dict "root" . "component" "api") }}
  namespace: {{ include "sdd-navigator.namespace" . }}
  labels:
    {{- include "sdd-navigator.labels" (dict "root" . "component" "api") | nindent 4 }}
data:
  API_PORT: {{ .Values.config.apiPort | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  DATABASE_HOST: {{ $dbHost | quote }}
  DATABASE_PORT: {{ .Values.config.databasePort | quote }}
  DATABASE_NAME: {{ .Values.config.databaseName | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:%s/%s" .Values.database.username .Values.database.password $dbHost .Values.config.databasePort .Values.config.databaseName | quote }}
